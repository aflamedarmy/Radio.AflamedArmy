<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radio.AflamedArmy</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<img src="images/logo.png" class="logo" alt="Logo">

<h1>Radio.AflamedArmy</h1>

<button id="playButton">

    <img id="playIcon" src="icons/play.svg" alt="Play">

</button>

<audio id="radio">
    <source src="https://know-recipient-steal-geometry.trycloudflare.com/stream" type="audio/mpeg">
</audio>

<input
    type="range"
    id="volume"
    min="0"
    max="1"
    step="0.01"
    value="1">

<div class="live-status">
    <span id="liveDot" class="dot offline"></span>
    <span id="liveText">OFF AIR</span>
</div>

<p id="statusText">Ready</p>

<script src="script.js"></script>

</body>

</html>
